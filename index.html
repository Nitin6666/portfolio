<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nitin Kumar | Portfolio</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0a0a0a;
      color: white;
      overflow-x: hidden;
    }

    /* NAVBAR */
    header {
      position: fixed;
      width: 100%;
      top: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 50px;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 20px;
    }

    nav a {
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: cyan;
    }

    .logo {
      font-weight: 600;
      font-size: 22px;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
    }

    .hero h1 {
      font-size: 3rem;
    }

    .hero span {
      color: cyan;
    }

    .hero p {
      margin-top: 10px;
      font-size: 1.2rem;
    }

    button {
      margin-top: 20px;
      padding: 10px 25px;
      border: none;
      background: cyan;
      color: black;
      font-weight: bold;
      cursor: pointer;
      border-radius: 25px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
    }

    /* TYPING TEXT */
    .typing {
      border-right: 3px solid cyan;
      white-space: nowrap;
      overflow: hidden;
      animation: typing 4s steps(30) infinite, blink 0.7s infinite;
    }

    @keyframes typing {
      0% { width: 0 }
      50% { width: 100% }
      100% { width: 0 }
    }

    @keyframes blink {
      50% { border-color: transparent }
    }

    /* SECTIONS */
    section {
      padding: 80px 20px;
      max-width: 1000px;
      margin: auto;
      text-align: center;
    }

    .skills-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
    }

    .skill {
      background: #111;
      padding: 10px 20px;
      border-radius: 20px;
      border: 1px solid cyan;
    }

    .project-card {
      background: #111;
      padding: 20px;
      margin: 15px 0;
      border-radius: 10px;
      transition: 0.3s;
    }

    .project-card:hover {
      transform: translateY(-5px);
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #000;
    }

    /* STARS BACKGROUND */
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: -1;
    }

    /* RESPONSIVE */
    @media(max-width: 768px) {
      nav {
        flex-direction: column;
      }

      .hero h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<header>
  <nav>
    <h2 class="logo">Nitin</h2>
    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>
</header>

<section id="home" class="hero">
  <h1>Hello, I'm <span>Nitin Kumar</span></h1>
  <p id="typing-text"></p>
  <button onclick="scrollToSection('contact')">Hire Me</button>
</section>

<section id="about">
  <h2>About Me</h2>
  <p>I am a motivated student passionate about web development and programming.</p>
</section>

<section id="skills">
  <h2>My Skills</h2>
  <div class="skills-container">
    <div class="skill">HTML</div>
    <div class="skill">CSS</div>
    <div class="skill">JavaScript</div>
    <div class="skill">Python</div>
  </div>
</section>

<section id="projects">
  <h2>Projects</h2>
  <div class="project-card">Portfolio Website</div>
  <div class="project-card">Python Projects</div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <input placeholder="Name">
  <input placeholder="Email">
  <textarea placeholder="Message"></textarea>
  <button>Send</button>
</section>

<footer>
  <p>© 2026 Nitin Kumar</p>
</footer>

<script>
  function scrollToSection(id) {
    document.getElementById(id).scrollIntoView({behavior: 'smooth'});
  }

  // ADVANCED PARTICLE STAR SYSTEM
  const canvas = document.getElementById("stars");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let particles = [];
  const PARTICLE_COUNT = 120;

  class Particle {
    constructor() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 2;
      this.speedX = (Math.random() - 0.5) * 0.5;
      this.speedY = (Math.random() - 0.5) * 0.5;
    }

    update() {
      this.x += this.speedX;
      this.y += this.speedY;

      // wrap around edges
      if (this.x < 0) this.x = canvas.width;
      if (this.x > canvas.width) this.x = 0;
      if (this.y < 0) this.y = canvas.height;
      if (this.y > canvas.height) this.y = 0;
    }

    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = "white";
      ctx.fill();
    }
  }

  function initParticles() {
    particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(new Particle());
    }
  }

  function connectParticles() {
    for (let a = 0; a < particles.length; a++) {
      for (let b = a; b < particles.length; b++) {
        let dx = particles[a].x - particles[b].x;
        let dy = particles[a].y - particles[b].y;
        let distance = dx * dx + dy * dy;

        if (distance < 10000) {
          ctx.beginPath();
          ctx.strokeStyle = "rgba(255,255,255,0.1)";
          ctx.lineWidth = 0.5;
          ctx.moveTo(particles[a].x, particles[a].y);
          ctx.lineTo(particles[b].x, particles[b].y);
          ctx.stroke();
        }
      }
    }
  }

  let mouse = {
    x: null,
    y: null,
    radius: 120
  };

  window.addEventListener("mousemove", function (event) {
    mouse.x = event.x;
    mouse.y = event.y;
  });

  function mouseEffect() {
    particles.forEach(p => {
      let dx = mouse.x - p.x;
      let dy = mouse.y - p.y;
      let distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < mouse.radius) {
        p.x -= dx / 20;
        p.y -= dy / 20;
      }
    });
  }

  function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
      p.update();
      p.draw();
    });

    connectParticles();
    mouseEffect();

    requestAnimationFrame(animateParticles);
  }

  window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initParticles();
  });

  initParticles();
  animateParticles();


  // ADVANCED TYPING ANIMATION (MULTI-ROLE LOOP)
  const roles = [
    "Frontend Developer",
    "Python Programmer",
    "Tech Enthusiast",
    "Future Software Engineer"
  ];

  let roleIndex = 0;
  let charIndex = 0;
  let isDeleting = false;
  const typingElement = document.getElementById("typing-text");

  function typeEffect() {
    const currentRole = roles[roleIndex];

    if (isDeleting) {
      charIndex--;
    } else {
      charIndex++;
    }

    typingElement.textContent = currentRole.substring(0, charIndex);

    let speed = isDeleting ? 50 : 100;

    if (!isDeleting && charIndex === currentRole.length) {
      speed = 1500; // pause at full text
      isDeleting = true;
    } else if (isDeleting && charIndex === 0) {
      isDeleting = false;
      roleIndex = (roleIndex + 1) % roles.length;
      speed = 500;
    }

    setTimeout(typeEffect, speed);
  }

  typeEffect();

</script>

</body>
</html>
